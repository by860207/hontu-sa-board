  const dpr=Math.min(devicePixelRatio||1,2),W=cv.clientWidth,H=Math.max(300,Math.min(430,W*0.64));
  cv.width=W*dpr;cv.height=H*dpr;cv.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,W,H);
  const padL=6,padR=52,padT=10,volH=58,gap=10,priceH=H-volH-gap-padT-4;
  const n=K.length,cw=(W-padL-padR)/n,bw=Math.max(1.3,cw*0.64);
  let lo=Infinity,hi=-Infinity;K.forEach(k=>{lo=Math.min(lo,k[3]);hi=Math.max(hi,k[2]);[6,7,8,9].forEach(m=>{if(k[m]!=null){lo=Math.min(lo,k[m]);hi=Math.max(hi,k[m]);}});});
  const a1d=cur.key&&cur.key.a1_date, a1i=a1d?K.findIndex(k=>k[0]===a1d):-1;
  const a1h=cur.key&&cur.key.a1_high;
  const pad=(hi-lo)*0.06||1;lo-=pad;hi+=pad;
  const yP=v=>padT+priceH-((v-lo)/(hi-lo))*priceH,x=i=>padL+i*cw+cw/2;
  if(a1i>=0){ctx.fillStyle=css('--panel2');ctx.globalAlpha=.5;ctx.fillRect(padL+a1i*cw,padT,(n-1-a1i)*cw,priceH);ctx.globalAlpha=1;}
  [[6,'--ma5'],[7,'--ma20'],[8,'--ma60'],[9,'--ma200']].forEach(([m,c])=>{ctx.strokeStyle=css(c);ctx.lineWidth=1.2;ctx.beginPath();let st=false;K.forEach((k,i)=>{if(k[m]==null)return;const px=x(i),py=yP(k[m]);st?ctx.lineTo(px,py):(ctx.moveTo(px,py),st=true);});ctx.stroke();});
  const up=css('--up'),down=css('--down');let vmax=0;K.forEach(k=>vmax=Math.max(vmax,k[5]));
  K.forEach((k,i)=>{const o=k[1],h=k[2],l=k[3],c=k[4],col=c>=o?up:down,px=x(i);ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(px,yP(h));ctx.lineTo(px,yP(l));ctx.stroke();const yo=yP(o),yc=yP(c);ctx.fillRect(px-bw/2,Math.min(yo,yc),bw,Math.max(1,Math.abs(yo-yc)));const vy=H-volH+(1-k[5]/vmax)*volH;ctx.globalAlpha=(i===a1i)?1:.5;ctx.fillStyle=(i===a1i)?css('--a1'):col;ctx.fillRect(px-bw/2,vy,bw,(k[5]/vmax)*volH);ctx.globalAlpha=1;});
  // 歷史訊號 events(突破連續收斂只標首個;A1/A2/反彈/蓄力全標)
  const evCol={A1:'--a1',A2:'--a2','反彈':'--ma20','突破':'--ma60','蓄力接近':'--ink2'};
  const evLb={A1:'A1',A2:'A2','反彈':'反','蓄力接近':'蓄'};
  let lastBk=-99;
  (cur.events||[]).forEach(e=>{
    const ei=K.findIndex(k=>k[0]===e.date);if(ei<0)return;
    if(e.type==='突破'){if(ei-lastBk<7)return;lastBk=ei;}
    const px=x(ei),py=yP(K[ei][2]),bk=e.type==='突破';
    ctx.fillStyle=css(evCol[e.type]||'--ink3');ctx.globalAlpha=bk?0.55:1;
    ctx.beginPath();ctx.arc(px,py-8,bk?2.6:4,0,7);ctx.fill();ctx.globalAlpha=1;
    if(evLb[e.type]){ctx.font='bold 9px '+css('--font-sans');ctx.textAlign='center';ctx.fillStyle=css(evCol[e.type]);ctx.fillText(evLb[e.type],px,py-15);}
  });
  ctx.strokeStyle=css('--line');ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(padL,H-volH-gap/2);ctx.lineTo(W-padR,H-volH-gap/2);ctx.stroke();
  G={K,x,yP,lo,hi,padL,padR,padT,priceH,volH,H,W,n,cw};
  if(cross.on)drawCross();
}
let drag=null,pinch=null,cross={on:false,px:0,py:0},G=null,lpTimer=null,downX=0,downY=0;const tp=new Map();
function crossAt(e){const r=cv.getBoundingClientRect();cross.px=e.clientX-r.left;cross.py=e.clientY-r.top;}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
// 十字線 + 日期/OHLC 資訊框(手機長按/桌面滑鼠移動觸發,如看盤軟體)
function drawCross(){
  if(!G)return;const{K,x,yP,lo,hi,padL,padR,padT,priceH,H,W,n,cw}=G;
  let idx=Math.round((cross.px-padL-cw/2)/cw);idx=Math.max(0,Math.min(n-1,idx));
  const k=K[idx],cx=x(idx),py=Math.max(padT,Math.min(cross.py,padT+priceH));
  ctx.save();
  ctx.strokeStyle=css('--ink2');ctx.globalAlpha=.85;ctx.lineWidth=1;ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(cx,padT);ctx.lineTo(cx,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(padL,py);ctx.lineTo(W-padR,py);ctx.stroke();
  ctx.setLineDash([]);ctx.globalAlpha=1;
  const pv=lo+(1-(py-padT)/priceH)*(hi-lo);
  ctx.fillStyle=css('--ink2');ctx.fillRect(W-padR,py-8,padR,16);
  ctx.fillStyle=css('--bg');ctx.font='bold 10px '+css('--font-mono');ctx.textAlign='center';ctx.fillText(pv.toFixed(1),W-padR/2,py+3.5);
  ctx.fillStyle=css('--a2');ctx.beginPath();ctx.arc(cx,yP(k[4]),3.2,0,7);ctx.fill();
  const prev=idx>0?K[idx-1][4]:k[1],chg=(k[4]/prev-1)*100,upc=chg>=0;
  const L=[k[0],'開 '+(+k[1]).toFixed(1)+'  高 '+(+k[2]).toFixed(1),'低 '+(+k[3]).toFixed(1)+'  收 '+(+k[4]).toFixed(1),(upc?'+':'')+chg.toFixed(2)+'%  量 '+Math.round(k[5]/1000).toLocaleString()+'張'];
  ctx.font='11px '+css('--font-mono');let bw=0;L.forEach(t=>bw=Math.max(bw,ctx.measureText(t).width));bw+=16;const bh=L.length*15+7;
  const bx=cross.px>W/2?padL+4:W-padR-bw-4,by=padT+2;
  ctx.globalAlpha=.93;ctx.fillStyle=css('--panel2');roundRect(bx,by,bw,bh,7);ctx.fill();ctx.strokeStyle=css('--line');ctx.lineWidth=1;roundRect(bx,by,bw,bh,7);ctx.stroke();ctx.globalAlpha=1;ctx.textAlign='left';
  L.forEach((t,i)=>{ctx.fillStyle=i===0?css('--ink'):i===3?(upc?css('--up'):css('--down')):css('--ink2');ctx.font=(i===0?'bold ':'')+'11px '+css('--font-mono');ctx.fillText(t,bx+8,by+15+i*15);});
  ctx.restore();
}
cv.addEventListener('pointerdown',e=>{if(!cur)return;downX=e.clientX;downY=e.clientY;drag={x:e.clientX,end:view.end};cv.setPointerCapture(e.pointerId);if(e.pointerType==='mouse'){cross.on=false;}else{clearTimeout(lpTimer);lpTimer=setTimeout(()=>{cross.on=true;drag=null;crossAt(e);draw();},320);}});
cv.addEventListener('pointermove',e=>{if(!cur)return;if(cross.on){crossAt(e);draw();return;}if(drag&&!pinch){if(Math.abs(e.clientX-downX)>6||Math.abs(e.clientY-downY)>6)clearTimeout(lpTimer);const N=cur.klines.length,cw=cv.clientWidth/view.cnt,dd=Math.round((e.clientX-drag.x)/cw);view.end=Math.max(view.cnt,Math.min(N,drag.end-dd));markZoom();draw();return;}if(e.pointerType==='mouse'){crossAt(e);cross.on=true;draw();}});
cv.addEventListener('pointerup',()=>{clearTimeout(lpTimer);drag=null;if(cross.on){cross.on=false;draw();}});
cv.addEventListener('pointercancel',()=>{clearTimeout(lpTimer);drag=null;if(cross.on){cross.on=false;draw();}});
cv.addEventListener('pointerleave',e=>{if(e.pointerType==='mouse'&&cross.on){cross.on=false;draw();}});
cv.addEventListener('wheel',e=>{if(!cur)return;e.preventDefault();const N=cur.klines.length;view.cnt=Math.max(20,Math.min(N,Math.round(view.cnt*(e.deltaY>0?1.15:.87))));markZoom();draw();},{passive:false});
cv.addEventListener('touchstart',e=>{[...e.changedTouches].forEach(t=>tp.set(t.identifier,t.clientX));if(tp.size===2){const v=[...tp.values()];pinch={d:Math.abs(v[0]-v[1]),cnt:view.cnt};drag=null;clearTimeout(lpTimer);if(cross.on){cross.on=false;draw();}}},{passive:true});
cv.addEventListener('touchmove',e=>{[...e.changedTouches].forEach(t=>{if(tp.has(t.identifier))tp.set(t.identifier,t.clientX);});if(pinch&&tp.size>=2&&cur){const v=[...tp.values()],nd=Math.abs(v[0]-v[1]),N=cur.klines.length;view.cnt=Math.max(20,Math.min(N,Math.round(pinch.cnt*pinch.d/Math.max(nd,1))));markZoom();draw();}},{passive:true});
cv.addEventListener('touchend',e=>{[...e.changedTouches].forEach(t=>tp.delete(t.identifier));if(tp.size<2)pinch=null;},{passive:true});
// 面板
function panelHTML(s){
  const m=(k,v,cls='')=>`<div class="metric"><span class="k">${k}</span><span class="v ${cls}">${v}</span></div>`;
  const K=s.key,cat=s.category;let rows='';
  if(K&&K.obs){
    rows=m('1日漲跌',(K.chg1d>0?'+':'')+K.chg1d+'%',K.chg1d>=0?'good':'warn')
      +m('20日漲跌',(K.chg20d>0?'+':'')+K.chg20d+'%',K.chg20d>=0?'good':'')
      +m('乖離MA60',(K.dist_ma60>0?'+':'')+K.dist_ma60+'%',Math.abs(K.dist_ma60)<15?'good':'warn')
      +m('資料日',s.signal_date);
  }
  else if(cat==='SA教科書'){const vs=K.vol_vs_a1>=100?'good':K.vol_vs_a1>=70?'warn':'',rs=K.rel_str_20d>=15?'good':K.rel_str_20d>=8?'warn':'',cd=(K.consol_days>=60&&K.consol_days<=90)?'good':'';
    rows=m('分數',K.score+'/10 · '+K.tier)+m('盤整天數',K.consol_days+'天',cd)+m('vs A1量能',K.vol_vs_a1+'%',vs)+m('相對強度20d',K.rel_str_20d+'%',rs)+m('A1量比',K.a1_vr)+m('Echo',K.echo_match?'✓':'—',K.echo_match?'good':'')+m('A1日',K.a1_date)+m('A1高',K.a1_high);}
  else if(cat==='反彈'){rows=m('等級',K.grade)+m('支撐',K.support_type)+m('回檔%',K.pullback_pct+'%')+m('訊號日',s.signal_date);}
  else if(cat==='SA蓄力接近'){rows=m('距A1高',K.dist_pct+'%','warn')+m('盤整天數',K.consol_days+'天')+m('A1高',K.a1_high)+m('A1日',K.a1_date);}
  else if(cat==='突破回測'){rows=m('頸線',K.neckline)+m('距頸線%',K.dist+'%')+m('量比',K.vol_ratio)+m('頸線天期',K.swing_age+'天')+m('訊號日',s.signal_date);}
  const _kl=s.klines,_vt=(_kl&&_kl.length)?_kl[_kl.length-1][5]:null;const _vr=(_vt!=null)?('<div class="metric"><span class="k">當日成交量</span><span class="v">'+Math.round(_vt/1000).toLocaleString()+' 張</span></div>'):'';rows=_vr+rows;
  const also=SIG.filter(x=>x.code===s.code&&x!==s).map(x=>x.category+(x.sub?('·'+x.sub):''));
  return `<span class="catTag">${cat}${s.sub?(' · '+s.sub):''}</span>`+`<h3>${s.sector||''}</h3>`+rows+
    (also.length?`<div class="also">⚡ 同時觸發：${[...new Set(also)].join('、')}</div>`:'');
}
function render(){if(!cur)return;$('#cName').textContent=cur.name+' '+cur.code;$('#cPx').textContent=(+cur.close).toFixed(cur.mkt==='jp'?0:2);const kl=cur.klines;$('#cPx').style.color=(kl.length>1&&cur.close>=kl[kl.length-2][4])?'var(--up)':'var(--down)';$('#panel').innerHTML=panelHTML(cur);draw();}
